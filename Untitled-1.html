<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEEE PIE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{color:white;overflow-x:hidden;}

/* NAVBAR */
.navbar{
  position:absolute;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:25px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(12px);
  z-index:1000;
}

.logo-left{
  position:absolute;
  left:20px;
}

.logo-left img{height:48px;}

.nav-links{
  display:flex;
  gap:20px;
}

.nav-links a{
  padding:10px 25px;
  background:rgba(187,247,208,0.6);
  border-radius:30px;
  color:black;
  text-decoration:none;
  transition:0.3s;
}

.nav-links a:hover{
  background:#bbf7d0;
  transform:scale(1.05);
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:120px 15%;
  position:relative;

  background: none;
}

/* PARALLAX BG */
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('images/bg.png') center/cover no-repeat;
  opacity:1;   /* FULL clarity */
  z-index:0;
}

@keyframes slowMove{
  from{transform:scale(1.1) translateY(0);}
  to{transform:scale(1.15) translateY(-20px);}
}

.hero-content{
  position:relative;
  z-index:2;
  animation:fadeUp 1.2s ease forwards;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px);}
  to{opacity:1;transform:translateY(0);}
}
.hero h2{
  font-size:clamp(16px, 3vw, 22px);
}
.hero h1{
  font-size:clamp(32px, 6vw, 52px);
}
.hero p{
  font-size:clamp(16px, 3vw, 20px);
}

/* BUTTONS */
.btn-group{
  display:flex;
  gap:15px;
  flex-wrap:wrap; /* important */
}

.btn{
  padding:12px 30px;
  border-radius:30px;
  border:1px solid white;
  background:rgba(255,255,255,0.3);
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px rgba(255,255,255,0.5);
}

.join{
  background:#22c55e;
  color:#022c22;
  box-shadow:0 0 15px rgba(34,197,94,0.7);
}


/* COUNTDOWN */
.countdown{
  margin-top:40px;
  display:flex;
  justify-content:space-between;
  max-width:700px;
  padding:20px 30px;
  border-radius:50px;
  background:#E5FFE6;
  border:2px solid #90EE90;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  animation:float 4s ease-in-out infinite;
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

@media(max-width:768px){
  .countdown{
    flex-wrap:wrap;
    gap:15px;
    justify-content:center;
    padding:15px;
  }

  .time-box{
    min-width:70px;
  }
}


.time-box p{
  font-size:32px;
  font-weight:bold;
  color:black;
}

.time-box span{
  font-size:14px;
  color:#065f46;
}

/* MOBILE */
@media(max-width:768px){
  .hero{text-align:center;align-items:center;padding:120px 20px;}
  .nav-links{display:none;}
  .countdown{flex-wrap:wrap;gap:15px;justify-content:center;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo-left">
    <img src="images/pielogo.png">
  </div>

  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Timeline</a>
    <a href="#">Sessions</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">

    <h2>IEEE Promotion of Innovation & Entrepreneurship</h2>
    <h1>V-Fiesta 5.0</h1>
    <p id="typewriter"></p>

    <div class="btn-group">
      <button class="btn">Register Now</button>
      <a href="https://www.ieee.org/membership-catalog/index.html?N=0." target="_blank">
        <button class="btn join">Join IEEE PIE</button>
      </a>
    </div>



    <!-- COUNTDOWN -->
    <div class="countdown">
      <div class="time-box"><p id="days">00</p><span>Days</span></div>
      <div class="time-box"><p id="hours">00</p><span>Hours</span></div>
      <div class="time-box"><p id="minutes">00</p><span>Minutes</span></div>
      <div class="time-box"><p id="seconds">00</p><span>Seconds</span></div>
    </div>

  </div>
</section>

<script>

/* TYPEWRITER */
const text = "An experience to shape your future";
let i = 0;
function typing(){
  if(i < text.length){
    document.getElementById("typewriter").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

/* COUNTDOWN */
const eventDate = new Date("April 20, 2026 09:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const gap = eventDate - now;

  document.getElementById("days").innerText = Math.floor(gap / (1000*60*60*24));
  document.getElementById("hours").innerText = Math.floor((gap % (1000*60*60*24))/(1000*60*60));
  document.getElementById("minutes").innerText = Math.floor((gap % (1000*60*60))/(1000*60));
  document.getElementById("seconds").innerText = Math.floor((gap % (1000*60))/1000);
},1000);

</script>

</body>
</html>
